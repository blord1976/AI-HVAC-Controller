# AI HVAC Blueprint - Approval & Rejection Handlers
# These automations handle notification button responses
# Create one set for each zone (LR, Upstairs, etc.)

# =============================================================================
# LIVING ROOM ZONE - Approval Handler
# =============================================================================
- id: ai_hvac_lr_approve_handler
  alias: "AI HVAC (LR) - Execute Approved"
  description: "Execute HVAC change when approved via notification"
  
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: "APPROVE_LR_HVAC"
  
  action:
    - variables:
        action_type: "{{ states('input_text.ai_hvac_lr_pending_action') }}"
        target_temp: "{{ states('input_text.ai_hvac_lr_pending_temp') }}"
        target_mode: "{{ states('input_text.ai_hvac_lr_pending_mode') }}"
        reason: "{{ states('input_text.ai_hvac_lr_pending_reason') }}"
    
    # Execute based on action type
    - choose:
        # Adjust temperature
        - conditions:
            - condition: template
              value_template: "{{ action_type == 'adjust_temp' }}"
          sequence:
            - service: climate.set_temperature
              target:
                entity_id: climate.lr_stat
              data:
                temperature: "{{ target_temp | float }}"
            
            - service: notify.mobile_app_brandons_iphone_16_pro
              data:
                title: "✅ LR HVAC Updated"
                message: "Living Room set to {{ target_temp }}°F"
        
        # Change mode
        - conditions:
            - condition: template
              value_template: "{{ action_type == 'change_mode' }}"
          sequence:
            - service: climate.set_hvac_mode
              target:
                entity_id: climate.lr_stat
              data:
                hvac_mode: "{{ target_mode }}"
            
            - service: notify.mobile_app_brandons_iphone_16_pro
              data:
                title: "✅ LR HVAC Updated"
                message: "Living Room mode: {{ target_mode }}"
        
        # Turn off
        - conditions:
            - condition: template
              value_template: "{{ action_type == 'turn_off' }}"
          sequence:
            - service: climate.turn_off
              target:
                entity_id: climate.lr_stat
            
            - service: notify.mobile_app_brandons_iphone_16_pro
              data:
                title: "✅ LR HVAC Updated"
                message: "Living Room HVAC turned off"
    
    # Log approval
    - service: logbook.log
      data:
        name: "AI HVAC Advisor (LR)"
        message: "✅ APPROVED: {{ action_type }} - {{ reason }}"
    
    # Track approval
    - service: counter.increment
      target:
        entity_id: counter.ai_hvac_lr_approvals

# =============================================================================
# LIVING ROOM ZONE - Rejection Handler
# =============================================================================
- id: ai_hvac_lr_reject_handler
  alias: "AI HVAC (LR) - Log Rejected"
  description: "Log when user rejects AI suggestion"
  
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: "REJECT_LR_HVAC"
  
  action:
    - variables:
        action_type: "{{ states('input_text.ai_hvac_lr_pending_action') }}"
        reason: "{{ states('input_text.ai_hvac_lr_pending_reason') }}"
    
    # Log rejection
    - service: logbook.log
      data:
        name: "AI HVAC Advisor (LR)"
        message: "❌ REJECTED: {{ action_type }} - {{ reason }}"
    
    # Track rejection
    - service: counter.increment
      target:
        entity_id: counter.ai_hvac_lr_rejections
    
    # Send acknowledgment
    - service: notify.mobile_app_brandons_iphone_16_pro
      data:
        title: "❌ Suggestion Declined"
        message: "No changes made to Living Room HVAC"

