# AI HVAC Blueprint - Input Helper Definitions
# Add these to your configuration.yaml or create via UI

# =============================================================================
# LIVING ROOM ZONE HELPERS
# =============================================================================

input_boolean:
  ai_hvac_lr_enabled:
    name: AI HVAC LR Enabled
    icon: mdi:robot
  
  ai_hvac_lr_eco_mode:
    name: AI HVAC LR ECO Mode
    icon: mdi:leaf
    initial: on

input_text:
  ai_hvac_lr_pending_action:
    name: AI HVAC LR Pending Action
    max: 50
  
  ai_hvac_lr_pending_temp:
    name: AI HVAC LR Pending Temperature
    max: 10
  
  ai_hvac_lr_pending_mode:
    name: AI HVAC LR Pending Mode
    max: 20
  
  ai_hvac_lr_pending_reason:
    name: AI HVAC LR Pending Reason
    max: 255

counter:
  ai_hvac_lr_approvals:
    name: AI HVAC LR Approvals
    icon: mdi:check-circle
  
  ai_hvac_lr_rejections:
    name: AI HVAC LR Rejections
    icon: mdi:close-circle

input_number:
  ai_hvac_lr_eco_cooling_offset:
    name: AI HVAC LR ECO Cooling Offset
    min: 0
    max: 10
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:thermometer-chevron-up
    initial: 5
  
  ai_hvac_lr_eco_heating_offset:
    name: AI HVAC LR ECO Heating Offset
    min: 0
    max: 10
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:thermometer-chevron-down
    initial: 5

# =============================================================================
# UPSTAIRS ZONE HELPERS
# =============================================================================

input_boolean:
  ai_hvac_upstairs_enabled:
    name: AI HVAC Upstairs Enabled
    icon: mdi:robot
  
  ai_hvac_upstairs_eco_mode:
    name: AI HVAC Upstairs ECO Mode
    icon: mdi:leaf
    initial: on

input_text:
  ai_hvac_upstairs_pending_action:
    name: AI HVAC Upstairs Pending Action
    max: 50
  
  ai_hvac_upstairs_pending_temp:
    name: AI HVAC Upstairs Pending Temperature
    max: 10
  
  ai_hvac_upstairs_pending_mode:
    name: AI HVAC Upstairs Pending Mode
    max: 20
  
  ai_hvac_upstairs_pending_reason:
    name: AI HVAC Upstairs Pending Reason
    max: 255

counter:
  ai_hvac_upstairs_approvals:
    name: AI HVAC Upstairs Approvals
    icon: mdi:check-circle
  
  ai_hvac_upstairs_rejections:
    name: AI HVAC Upstairs Rejections
    icon: mdi:close-circle

input_number:
  ai_hvac_upstairs_eco_cooling_offset:
    name: AI HVAC Upstairs ECO Cooling Offset
    min: 0
    max: 10
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:thermometer-chevron-up
    initial: 5
  
  ai_hvac_upstairs_eco_heating_offset:
    name: AI HVAC Upstairs ECO Heating Offset
    min: 0
    max: 10
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:thermometer-chevron-down
    initial: 5

# =============================================================================
# TEMPLATE SENSORS - Approval Rate Tracking
# =============================================================================

template:
  - sensor:
      # Living Room Approval Rate
      - name: "AI HVAC LR Approval Rate"
        unique_id: ai_hvac_lr_approval_rate
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent
        state: >
          {% set approved = states('counter.ai_hvac_lr_approvals') | int %}
          {% set rejected = states('counter.ai_hvac_lr_rejections') | int %}
          {% set total = approved + rejected %}
          {% if total > 0 %}
            {{ ((approved / total) * 100) | round(0) }}
          {% else %}
            0
          {% endif %}
      
      # Upstairs Approval Rate
      - name: "AI HVAC Upstairs Approval Rate"
        unique_id: ai_hvac_upstairs_approval_rate
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent
        state: >
          {% set approved = states('counter.ai_hvac_upstairs_approvals') | int %}
          {% set rejected = states('counter.ai_hvac_upstairs_rejections') | int %}
          {% set total = approved + rejected %}
          {% if total > 0 %}
            {{ ((approved / total) * 100) | round(0) }}
          {% else %}
            0
          {% endif %}
